<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoamTassie — Tasmania's friendliest removalists</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBFAF7;
  --bg-alt: #F3F0E9;
  --ink: #0B2545;
  --ink-2: #1E3A5F;
  --muted: #6B7A90;
  --line: #E4DFD3;
  --brand: #0B2545;
  --brand-ink: #ffffff;
  --accent: #F26B3A;
  --accent-ink: #ffffff;
  --accent-soft: #FDE4D6;
  --ok: #1F7A5C;
  --card: #ffffff;
  --shadow: 0 1px 2px rgba(11,37,69,0.06), 0 8px 24px rgba(11,37,69,0.06);
  --shadow-lg: 0 2px 4px rgba(11,37,69,0.08), 0 24px 48px rgba(11,37,69,0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 22px;
  --font-display: 'Sora', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --nav-h: 64px;
}

[data-theme="dark"] {
  --bg: #0A1A2E;
  --bg-alt: #0F2440;
  --ink: #F5F2EC;
  --ink-2: #D8D2C6;
  --muted: #8FA0B5;
  --line: #1F3858;
  --brand: #F26B3A;
  --brand-ink: #0A1A2E;
  --card: #0F2440;
  --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.25);
  --shadow-lg: 0 2px 4px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.35);
  --accent-soft: rgba(242,107,58,0.15);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background 0.25s ease, color 0.25s ease;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0;
  color: var(--ink);
  font-weight: 600;
}
h1 { font-size: clamp(36px, 6vw, 76px); letter-spacing: -0.035em; }
h2 { font-size: clamp(28px, 3.6vw, 48px); letter-spacing: -0.03em; }
h3 { font-size: 22px; }
p { margin: 0; }

.container {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ── Nav ─────────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: saturate(1.2) blur(10px);
  border-bottom: 1px solid var(--line);
  height: var(--nav-h);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 100%;
}
.nav-links {
  display: flex; gap: 28px; align-items: center;
}
.nav-links a {
  color: var(--ink-2); text-decoration: none; font-size: 14.5px; font-weight: 500;
  transition: color .15s;
}
.nav-links a:hover { color: var(--accent); }
.nav-cta { display: flex; gap: 8px; align-items: center; }

/* Night mode toggle */
.theme-toggle {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--line);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink); font-size: 16px;
  transition: background .15s, border-color .15s, transform .15s;
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--bg-alt); border-color: var(--muted); transform: rotate(15deg); }

/* Mobile hamburger */
.nav-burger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  padding: 8px; border: 0; background: transparent; color: var(--ink);
}
.nav-burger span {
  display: block; width: 22px; height: 2px; background: currentColor;
  border-radius: 2px; transition: transform .25s ease, opacity .25s ease;
}
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* Mobile drawer */
.nav-drawer {
  display: none; position: fixed; top: var(--nav-h); left: 0; right: 0;
  background: var(--bg); border-bottom: 1px solid var(--line);
  padding: 8px 24px 28px; z-index: 49;
  box-shadow: 0 16px 40px rgba(0,0,0,0.14);
  flex-direction: column;
  animation: slideDown .2s ease;
}
.nav-drawer.open { display: flex; }
.drawer-links { display: flex; flex-direction: column; }
.drawer-links a {
  color: var(--ink-2); text-decoration: none; font-size: 16px; font-weight: 500;
  padding: 14px 4px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  transition: color .15s;
}
.drawer-links a::after {
  content: '›'; font-size: 20px; color: var(--line); transition: color .15s, transform .15s;
}
.drawer-links a:last-child { border-bottom: none; }
.drawer-links a:hover { color: var(--accent); }
.drawer-links a:hover::after { color: var(--accent); transform: translateX(3px); }
.drawer-cta {
  margin-top: 20px; padding-top: 20px;
  border-top: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px;
}
.drawer-cta .btn {
  width: 100%; justify-content: center; padding: 14px 22px; font-size: 15px;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-burger { display: flex; }
  .nav-cta .btn-ghost { display: none; }
}

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  appearance: none; border: 0; cursor: pointer;
  font-family: inherit; font-weight: 600; font-size: 15px;
  padding: 14px 22px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  text-decoration: none; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary {
  background: var(--accent); color: var(--accent-ink, #fff);
  box-shadow: 0 6px 16px color-mix(in oklab, var(--accent) 40%, transparent);
}
.btn-primary:hover { box-shadow: 0 10px 22px color-mix(in oklab, var(--accent) 50%, transparent); }
.btn-dark { background: var(--brand); color: var(--brand-ink); }
.btn-ghost {
  background: transparent; color: var(--ink); border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--ink); }
.btn-sm { padding: 10px 16px; font-size: 14px; }
.btn-lg { padding: 18px 28px; font-size: 17px; }
@media (max-width: 480px) {
  .btn-lg { padding: 15px 22px; font-size: 16px; }
}

/* ── Tags ─────────────────────────────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  background: var(--accent-soft); color: var(--accent);
  font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em;
}
.tag .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

/* ── Cards ─────────────────────────────────────────────────── */
.card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); box-shadow: var(--shadow);
}

/* ── Sections ─────────────────────────────────────────────── */
section { padding: 80px 0; }
@media (max-width: 768px) { section { padding: 56px 0; } }
.section-head {
  display: flex; justify-content: space-between; align-items: end;
  gap: 24px; margin-bottom: 48px; flex-wrap: wrap;
}
@media (max-width: 640px) { .section-head { margin-bottom: 32px; } }
.section-head p.lead { color: var(--muted); max-width: 520px; }
.eyebrow {
  font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 14px; display: inline-block;
}

/* ── Hero ─────────────────────────────────────────────────── */
.hero { padding: 56px 0 64px; position: relative; overflow: hidden; }
@media (max-width: 768px) { .hero { padding: 36px 0 48px; } }
.hero-grid {
  display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px; align-items: start;
}
@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; gap: 36px; } }
.hero h1 .accent { color: var(--accent); }
.hero h1 .underline { position: relative; white-space: nowrap; }
.hero h1 .underline::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -4px; height: 10px;
  background: var(--accent); opacity: 0.3; border-radius: 4px;
}
.hero-sub {
  font-size: 18px; color: var(--ink-2); margin-top: 22px; max-width: 520px; line-height: 1.5;
}
@media (max-width: 480px) { .hero-sub { font-size: 16px; } }
.hero-stats {
  display: flex; gap: 28px; margin-top: 32px; padding-top: 24px;
  border-top: 1px solid var(--line); flex-wrap: wrap;
}
.hero-stat .n {
  font-family: var(--font-display); font-size: 26px; font-weight: 600;
  color: var(--ink); letter-spacing: -0.02em;
}
.hero-stat .l { font-size: 13px; color: var(--muted); }

/* ── Quote widget ─────────────────────────────────────────── */
.quote-widget {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden;
}
.quote-tabs {
  display: flex; border-bottom: 1px solid var(--line); padding: 8px;
  gap: 4px; background: var(--bg-alt);
}
.quote-tab {
  flex: 1; padding: 10px 12px; border-radius: 10px;
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  border: 0; background: transparent; color: var(--muted); font-family: inherit;
}
.quote-tab.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }
.quote-body { padding: 20px; }
.map-wrap {
  position: relative; background: var(--bg-alt); border-radius: 14px;
  padding: 10px; border: 1px solid var(--line);
}
.map-wrap svg { width: 100%; height: auto; display: block; }
.map-region {
  fill: color-mix(in oklab, var(--ink) 12%, transparent);
  stroke: var(--card); stroke-width: 1.5; cursor: pointer;
  transition: fill .15s ease; transform-origin: center; transform-box: fill-box;
}
.map-region:hover { fill: color-mix(in oklab, var(--accent) 50%, transparent); }
.map-region.from { fill: var(--brand); }
.map-region.to   { fill: var(--accent); }
.map-legend {
  display: flex; gap: 16px; margin-top: 10px; padding: 0 4px;
  font-size: 12.5px; color: var(--muted); flex-wrap: wrap;
}
.map-legend .sw {
  display: inline-block; width: 10px; height: 10px; border-radius: 3px;
  margin-right: 5px; vertical-align: middle;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
@media (max-width: 400px) { .field-row { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.field input, .field select {
  font-family: inherit; font-size: 15px; padding: 12px 14px;
  border-radius: 10px; border: 1px solid var(--line);
  background: var(--bg); color: var(--ink);
}
.field input:focus, .field select:focus {
  outline: 2px solid var(--accent); border-color: var(--accent);
}
.quote-footer {
  display: flex; gap: 12px; align-items: center; margin-top: 16px;
  padding-top: 14px; border-top: 1px dashed var(--line); flex-wrap: wrap;
}
.quote-footer .price {
  font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--ink);
}
.quote-footer .price small {
  font-size: 13px; color: var(--muted); font-weight: 400;
  margin-right: 4px; font-family: var(--font-body);
}

/* ── Trust strip ──────────────────────────────────────────── */
.trust-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
  padding: 24px 28px; background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); margin-top: 40px;
}
@media (max-width: 720px) { .trust-strip { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 360px) { .trust-strip { grid-template-columns: 1fr; } }
.trust-item { display: flex; align-items: center; gap: 12px; }
.trust-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.trust-item .t { font-weight: 600; font-size: 14.5px; }
.trust-item .s { font-size: 12.5px; color: var(--muted); }

/* ── Services ─────────────────────────────────────────────── */
.services-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}
@media (max-width: 900px) { .services-grid { grid-template-columns: 1fr; } }
@media (min-width: 540px) and (max-width: 900px) { .services-grid { grid-template-columns: 1fr 1fr; } }
.service {
  padding: 28px; background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); display: flex; flex-direction: column;
  gap: 12px; position: relative; overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
}
.service:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.service .num {
  font-family: var(--font-display); font-size: 13px; color: var(--muted);
  letter-spacing: 0.12em;
}
.service h3 { margin-bottom: 2px; }
.service ul {
  list-style: none; padding: 0; margin: 6px 0 0;
  display: flex; flex-direction: column; gap: 8px;
}
.service ul li {
  font-size: 14.5px; color: var(--ink-2);
  padding-left: 22px; position: relative;
}
.service ul li::before {
  content: ''; position: absolute; left: 0; top: 9px;
  width: 12px; height: 2px; background: var(--accent); border-radius: 2px;
}
.service .price {
  margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: baseline;
}
.service .price .amount {
  font-family: var(--font-display); font-size: 24px; font-weight: 600; color: var(--ink);
}
.service .price small { color: var(--muted); font-size: 13px; }

/* ── Calculator ───────────────────────────────────────────── */
.calc {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 36px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 40px; box-shadow: var(--shadow);
}
@media (max-width: 900px) { .calc { grid-template-columns: 1fr; padding: 24px; } }
.calc-controls { display: flex; flex-direction: column; gap: 22px; }
.calc-ctrl label {
  font-size: 13px; font-weight: 600; color: var(--ink);
  display: flex; justify-content: space-between; margin-bottom: 10px;
}
.calc-ctrl label .v { color: var(--accent); font-family: var(--font-display); }
.calc-ctrl input[type="range"] {
  width: 100%; -webkit-appearance: none; height: 6px;
  background: var(--bg-alt); border-radius: 999px; outline: none;
}
.calc-ctrl input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
  border: 3px solid var(--card); box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.size-toggle { display: flex; gap: 6px; flex-wrap: wrap; }
.size-toggle button {
  flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 12px;
  border: 1px solid var(--line); background: var(--bg);
  font-family: inherit; font-weight: 600; font-size: 13px;
  cursor: pointer; color: var(--ink-2); text-align: left;
  display: flex; flex-direction: column; gap: 2px;
}
.size-toggle button .sz-sub { font-size: 11px; color: var(--muted); font-weight: 400; }
.size-toggle button.active {
  background: var(--brand); color: var(--brand-ink); border-color: var(--brand);
}
.size-toggle button.active .sz-sub {
  color: color-mix(in oklab, var(--brand-ink) 70%, transparent);
}
.addons { display: flex; flex-direction: column; gap: 8px; }
.addon {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; background: var(--bg-alt); border-radius: 10px;
  cursor: pointer; user-select: none;
}
.addon .check {
  width: 20px; height: 20px; border-radius: 6px;
  border: 1.5px solid var(--line); background: var(--card);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.addon.on .check { background: var(--accent); border-color: var(--accent); color: white; }
.addon .price { color: var(--muted); font-size: 13px; }
.calc-result {
  background: var(--brand); color: var(--brand-ink);
  border-radius: var(--radius); padding: 32px;
  display: flex; flex-direction: column; gap: 16px;
  position: relative; overflow: hidden;
}
.calc-result::before {
  content: ''; position: absolute; right: -60px; top: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: var(--accent); opacity: 0.2;
}
.calc-result .label {
  font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.7;
}
.calc-result .big {
  font-family: var(--font-display); font-size: clamp(48px, 8vw, 64px); font-weight: 600;
  letter-spacing: -0.04em; line-height: 1;
}
.calc-result .big sup { font-size: 24px; font-weight: 500; vertical-align: top; margin-right: 4px; opacity: 0.8; }
.calc-result .range { font-size: 14px; opacity: 0.8; }
.calc-result .breakdown {
  margin-top: 4px; padding-top: 16px;
  border-top: 1px solid color-mix(in oklab, var(--brand-ink) 20%, transparent);
  display: flex; flex-direction: column; gap: 8px; font-size: 14px;
}
.calc-result .breakdown .row { display: flex; justify-content: space-between; }
.calc-result .breakdown .row span:first-child { opacity: 0.75; }

/* ── About ────────────────────────────────────────────────── */
.about-grid {
  display: grid; grid-template-columns: 1fr 1.1fr; gap: 56px; align-items: center;
}
@media (max-width: 900px) { .about-grid { grid-template-columns: 1fr; gap: 32px; } }
.about-photo {
  border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/5;
  position: relative;
  background: repeating-linear-gradient(
    135deg,
    var(--bg-alt) 0px, var(--bg-alt) 12px,
    color-mix(in oklab, var(--bg-alt) 70%, var(--ink)) 12px,
    color-mix(in oklab, var(--bg-alt) 70%, var(--ink)) 13px
  );
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  color: var(--muted); text-align: center; padding: 20px;
}
@media (max-width: 900px) { .about-photo { aspect-ratio: 16/9; } }
.about-photo .ph-badge {
  position: absolute; top: 16px; left: 16px;
  background: var(--card); padding: 6px 10px; border-radius: 6px;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); border: 1px solid var(--line);
}
.about-points {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 28px;
}
.about-point { padding: 16px; background: var(--bg-alt); border-radius: 12px; }
.about-point .n {
  font-family: var(--font-display); font-size: 28px; font-weight: 600;
  color: var(--accent); line-height: 1;
}
.about-point .t { font-size: 13.5px; color: var(--ink-2); margin-top: 5px; }

/* ── Testimonials ─────────────────────────────────────────── */
.testi-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}
@media (max-width: 900px) { .testi-grid { grid-template-columns: 1fr; } }
@media (min-width: 540px) and (max-width: 900px) { .testi-grid { grid-template-columns: 1fr 1fr; } }
.testi {
  padding: 26px; background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); display: flex; flex-direction: column; gap: 16px;
}
.testi .stars { color: var(--accent); font-size: 14px; letter-spacing: 2px; }
.testi .q { font-size: 16px; line-height: 1.55; color: var(--ink-2); flex: 1; }
.testi .who {
  display: flex; align-items: center; gap: 12px;
  padding-top: 16px; border-top: 1px solid var(--line);
}
.testi .av {
  width: 40px; height: 40px; border-radius: 50%; background: var(--bg-alt);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 600; color: var(--ink); font-size: 15px;
  flex-shrink: 0;
}
.testi .who .n { font-size: 14px; font-weight: 600; }
.testi .who .l { font-size: 12.5px; color: var(--muted); }

/* ── FAQ ──────────────────────────────────────────────────── */
.faq-grid { max-width: 820px; margin: 0 auto; }
.faq-item { border-bottom: 1px solid var(--line); padding: 20px 0; }
.faq-item summary {
  list-style: none; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--font-display); font-weight: 600; font-size: clamp(16px, 2.5vw, 19px);
  color: var(--ink); gap: 20px;
}
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary .plus {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-alt); display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--ink-2); font-weight: 400; flex-shrink: 0;
  transition: transform .2s ease, background .2s ease;
}
.faq-item[open] summary .plus { transform: rotate(45deg); background: var(--accent); color: white; }
.faq-item .a { margin-top: 12px; color: var(--muted); font-size: 15.5px; line-height: 1.6; max-width: 640px; }

/* ── CTA banner ───────────────────────────────────────────── */
.cta-banner {
  background: var(--brand); color: var(--brand-ink);
  border-radius: var(--radius-lg); padding: 56px 48px;
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; align-items: center;
  position: relative; overflow: hidden;
}
@media (max-width: 900px) { .cta-banner { grid-template-columns: 1fr; padding: 36px 28px; } }
.cta-banner h2 { color: var(--brand-ink); }
.cta-banner .deco {
  position: absolute; right: -40px; bottom: -40px;
  width: 280px; height: 280px; border: 40px solid var(--accent); opacity: 0.4;
  border-radius: 50%;
}
.cta-banner p {
  color: color-mix(in oklab, var(--brand-ink) 75%, transparent);
  font-size: 17px; max-width: 440px;
}
.cta-phone {
  display: flex; flex-direction: column; gap: 4px; padding: 18px 22px;
  background: color-mix(in oklab, var(--brand-ink) 10%, transparent);
  border-radius: var(--radius);
  border: 1px solid color-mix(in oklab, var(--brand-ink) 18%, transparent);
}
.cta-phone .l { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.7; }
.cta-phone .num {
  font-family: var(--font-display); font-size: clamp(22px, 4vw, 32px);
  font-weight: 600; letter-spacing: -0.02em;
}

/* ── Footer ───────────────────────────────────────────────── */
footer {
  padding: 56px 0 28px; border-top: 1px solid var(--line);
  background: var(--bg-alt);
}
.footer-grid {
  display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 40px;
  margin-bottom: 40px;
}
@media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 28px; } }
@media (max-width: 480px) { .footer-grid { grid-template-columns: 1fr; } }
.footer-col h4 {
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
}
.footer-col a, .footer-col p {
  display: block; color: var(--ink-2); text-decoration: none;
  font-size: 14.5px; margin-bottom: 8px;
}
.footer-col a:hover { color: var(--accent); }
.footer-bottom {
  display: flex; justify-content: space-between; padding-top: 22px;
  border-top: 1px solid var(--line); font-size: 13px; color: var(--muted);
  flex-wrap: wrap; gap: 10px;
}

/* ── Logo ─────────────────────────────────────────────────── */
.logo { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.logo-mark { width: 34px; height: 34px; flex-shrink: 0; }
.logo-text {
  font-family: var(--font-display); font-weight: 600; font-size: 21px;
  letter-spacing: -0.025em; color: var(--ink);
}
.logo-text .tail { color: var(--accent); }

/* ── Transition helpers ───────────────────────────────────── */
.card, .service, .testi, .trust-strip, .quote-widget, .calc, .cta-banner,
.about-photo, .about-point, .addon, .faq-item summary .plus {
  transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
/* ─── Tasmania region data ─────────────────────────────────── */
const TAS_REGIONS = [
  { id: 'north-west', name: 'North West', city: 'Burnie · Devonport',
    path: 'M90,90 L180,85 L220,110 L215,155 L140,165 L95,145 Z' },
  { id: 'launceston', name: 'Launceston & North', city: 'Launceston',
    path: 'M220,110 L310,100 L330,150 L260,175 L215,155 Z' },
  { id: 'east-coast', name: 'East Coast', city: 'St Helens · Bicheno',
    path: 'M330,150 L360,170 L370,250 L340,290 L310,280 L300,220 Z' },
  { id: 'midlands', name: 'Midlands', city: 'Oatlands · Campbell Town',
    path: 'M215,155 L260,175 L300,220 L290,260 L230,255 L205,220 Z' },
  { id: 'hobart', name: 'Hobart & South', city: 'Hobart · Kingston',
    path: 'M230,255 L290,260 L310,280 L305,320 L270,340 L225,320 L215,285 Z' },
  { id: 'west-coast', name: 'West Coast', city: 'Strahan · Queenstown',
    path: 'M95,145 L140,165 L205,220 L230,255 L215,285 L170,290 L110,240 L85,180 Z' },
];

/* ─── Logo ─────────────────────────────────────────────────── */
function LogoMark({ variant = 'monogram', size = 34 }) {
  if (variant === 'badge') {
    return (
      <svg className="logo-mark" width={size} height={size} viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" fill="var(--brand)" />
        <circle cx="20" cy="20" r="16" fill="none" stroke="var(--accent)" strokeWidth="0.8" strokeDasharray="1 2" />
        <path d="M8 25l5-7 4 4 5-8 5 6 5-4v9H8z" fill="var(--accent)" />
        <circle cx="28" cy="13" r="2" fill="var(--bg)" opacity="0.9" />
        <line x1="8" y1="27.5" x2="32" y2="27.5" stroke="var(--bg)" strokeWidth="0.6" opacity="0.5" />
      </svg>
    );
  }
  if (variant === 'default') {
    return (
      <svg className="logo-mark" width={size} height={size} viewBox="0 0 40 40" fill="none">
        <rect x="1" y="1" width="38" height="38" rx="10" fill="var(--brand)" />
        <path d="M7 28l6-10 4 5 4-8 5 7 4-3 3 3v6H7z" fill="var(--accent)" opacity="0.95"/>
        <line x1="7" y1="28.5" x2="33" y2="28.5" stroke="var(--bg)" strokeWidth="0.8" opacity="0.6" />
        <rect x="9" y="10" width="3" height="13" fill="var(--brand-ink)" />
        <path d="M12 10h7c2.6 0 4.5 1.8 4.5 4.2S21.6 18.4 19 18.4h-7v-2.6h6.6c1.2 0 1.9-.7 1.9-1.6s-.7-1.6-1.9-1.6H12v-2.6z" fill="var(--brand-ink)" />
        <circle cx="28" cy="11" r="2.2" fill="var(--accent)" />
      </svg>
    );
  }
  // monogram (default)
  return (
    <svg className="logo-mark" width={size} height={size} viewBox="0 0 40 40" fill="none">
      <rect x="1" y="1" width="38" height="38" rx="10" fill="var(--brand)" />
      <path d="M11 12h10.5c3.6 0 6 2.2 6 5.4 0 2.4-1.4 4.3-3.7 5L28 29h-4.1l-4-6h-4.4v6H11V12zm4.5 3.6v4.4H21c1.6 0 2.6-.9 2.6-2.2s-1-2.2-2.6-2.2h-5.5z"
        fill="var(--brand-ink)" />
      <circle cx="30" cy="13" r="2.5" fill="var(--accent)" />
    </svg>
  );
}

function Logo({ size = 34 }) {
  return (
    <a href="#" className="logo" aria-label="RoamTassie home">
      <LogoMark variant="monogram" size={size} />
      <span className="logo-text">Roam<span className="tail">Tassie</span></span>
    </a>
  );
}

/* ─── Map picker ───────────────────────────────────────────── */
function TasMap({ from, to, onPick }) {
  const mode = from ? (to ? 'done' : 'to') : 'from';
  const positions = {
    'north-west': [155, 125], 'launceston': [270, 135],
    'east-coast': [335, 225], 'midlands': [250, 215],
    'hobart': [265, 305], 'west-coast': [150, 230],
  };
  return (
    <div className="map-wrap">
      <svg viewBox="60 70 330 290" xmlns="http://www.w3.org/2000/svg" aria-label="Tasmania quote map">
        <defs>
          <pattern id="waves" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
            <path d="M0 9 Q 4.5 4, 9 9 T 18 9" stroke="var(--line)" strokeWidth="0.5" fill="none" />
          </pattern>
        </defs>
        <rect x="60" y="70" width="330" height="290" fill="url(#waves)" opacity="0.6" />
        {TAS_REGIONS.map(r => {
          const cls = ['map-region', from === r.id ? 'from' : '', to === r.id ? 'to' : ''].filter(Boolean).join(' ');
          return (
            <g key={r.id}>
              <path d={r.path} className={cls} onClick={() => onPick(r.id)}>
                <title>{r.name}</title>
              </path>
            </g>
          );
        })}
        {TAS_REGIONS.map(r => {
          const pos = positions[r.id];
          const active = from === r.id || to === r.id;
          return (
            <text key={r.id + '-t'} x={pos[0]} y={pos[1]} textAnchor="middle"
              fontSize="11" fontFamily="Inter, sans-serif" fontWeight="600"
              fill={active ? 'white' : 'var(--ink-2)'}
              pointerEvents="none" style={{letterSpacing: '-0.01em'}}>
              {r.name}
            </text>
          );
        })}
        {from && to && (() => {
          const [fx, fy] = positions[from];
          const [tx, ty] = positions[to];
          return (
            <g>
              <path d={`M${fx} ${fy} Q ${(fx+tx)/2} ${Math.min(fy,ty)-30}, ${tx} ${ty}`}
                stroke="var(--accent)" strokeWidth="2" fill="none" strokeDasharray="4 4">
                <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1s" repeatCount="indefinite" />
              </path>
            </g>
          );
        })()}
      </svg>
      <div className="map-legend">
        <span><span className="sw" style={{background: 'var(--brand)'}}/>From</span>
        <span><span className="sw" style={{background: 'var(--accent)'}}/>To</span>
        <span style={{marginLeft: 'auto', color: 'var(--accent)', fontWeight: 600}}>
          {mode === 'from' ? 'Tap your pickup →' : mode === 'to' ? 'Now tap drop-off →' : '✓ Route set'}
        </span>
      </div>
    </div>
  );
}

/* ─── Quote widget ─────────────────────────────────────────── */
function QuoteWidget() {
  const [tab, setTab] = React.useState('map');
  const [from, setFrom] = React.useState(null);
  const [to, setTo] = React.useState(null);
  const [date, setDate] = React.useState('');
  const [size, setSize] = React.useState('2br');

  const pick = (id) => {
    if (!from) setFrom(id);
    else if (!to && id !== from) setTo(id);
    else { setFrom(id); setTo(null); }
  };
  const reset = () => { setFrom(null); setTo(null); };

  const sizeMult = { studio: 0.7, '1br': 1, '2br': 1.5, '3br': 2.1, '4br': 2.8 }[size];
  const basePrice = from && to ? Math.round(320 * sizeMult) : null;

  const fromName = from ? TAS_REGIONS.find(r => r.id === from)?.name : '—';
  const toName = to ? TAS_REGIONS.find(r => r.id === to)?.name : '—';

  return (
    <div className="quote-widget">
      <div className="quote-tabs">
        <button className={`quote-tab ${tab === 'map' ? 'active' : ''}`} onClick={() => setTab('map')}>
          📍 Map picker
        </button>
        <button className={`quote-tab ${tab === 'form' ? 'active' : ''}`} onClick={() => setTab('form')}>
          📝 Quick form
        </button>
      </div>
      <div className="quote-body">
        {tab === 'map' ? (
          <TasMap from={from} to={to} onPick={pick} />
        ) : (
          <div style={{display: 'grid', gap: 12}}>
            <div className="field">
              <label>From</label>
              <select value={from || ''} onChange={e => setFrom(e.target.value || null)}>
                <option value="">Pick your pickup suburb</option>
                {TAS_REGIONS.map(r => <option key={r.id} value={r.id}>{r.name} — {r.city}</option>)}
              </select>
            </div>
            <div className="field">
              <label>To</label>
              <select value={to || ''} onChange={e => setTo(e.target.value || null)}>
                <option value="">Where to, mate?</option>
                {TAS_REGIONS.map(r => <option key={r.id} value={r.id}>{r.name} — {r.city}</option>)}
              </select>
            </div>
          </div>
        )}
        <div className="field-row">
          <div className="field">
            <label>Move date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          <div className="field">
            <label>Home size</label>
            <select value={size} onChange={e => setSize(e.target.value)}>
              <option value="studio">Studio</option>
              <option value="1br">1 bedroom</option>
              <option value="2br">2 bedrooms</option>
              <option value="3br">3 bedrooms</option>
              <option value="4br">4+ bedrooms</option>
            </select>
          </div>
        </div>
        <div className="quote-footer">
          <div className="price">
            {basePrice ? (
              <><small>from</small>${basePrice}</>
            ) : (
              <span style={{fontSize: 14, color: 'var(--muted)', fontFamily: 'var(--font-body)', fontWeight: 400}}>
                {fromName} → {toName}
              </span>
            )}
          </div>
          <div style={{marginLeft: 'auto', display: 'flex', gap: 8}}>
            {(from || to) && (
              <button className="btn btn-ghost btn-sm" onClick={reset}>Reset</button>
            )}
            <button className="btn btn-primary btn-sm" disabled={!from || !to}>
              Get my quote →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Hero ─────────────────────────────────────────────────── */
function Hero() {
  const trust = [
    { icon: '🛡', t: 'Fully insured', s: 'Up to $100k cover' },
    { icon: '★', t: '4.9 from 380+', s: 'Google reviews' },
    { icon: '🏠', t: 'Tassie-owned', s: 'Family business' },
    { icon: '📅', t: 'Flexible booking', s: 'Free reschedule' },
  ];
  return (
    <section className="hero">
      <div className="container">
        <div className="hero-grid">
          <div>
            <span className="tag"><span className="dot"/> Tasmania's friendliest removalists</span>
            <h1 style={{marginTop: 20}}>
              Moving <span className="accent">across Tassie?</span><br/>
              We'll sort it.
            </h1>
            <p className="hero-sub">
              Local removalists who treat your gear like our own. Get a fixed-price quote in under
              a minute — no dodgy surprises, no hidden fees, just a smooth move from Burnie to Hobart
              (and everywhere between).
            </p>
            <div style={{display: 'flex', gap: 12, marginTop: 28, flexWrap: 'wrap'}}>
              <a href="#quote" className="btn btn-primary btn-lg">Get a free quote →</a>
              <a href="#services" className="btn btn-ghost btn-lg">See how it works</a>
            </div>
            <div className="hero-stats">
              <div className="hero-stat"><div className="n">12 yrs</div><div className="l">In Tassie since 2013</div></div>
              <div className="hero-stat"><div className="n">8,400+</div><div className="l">Homes moved</div></div>
              <div className="hero-stat"><div className="n">AFRA</div><div className="l">Accredited member</div></div>
            </div>
          </div>
          <div id="quote">
            <QuoteWidget />
          </div>
        </div>
        <div className="trust-strip">
          {trust.map((t, i) => (
            <div className="trust-item" key={i}>
              <div className="trust-icon" style={{fontSize: 18}}>{t.icon}</div>
              <div>
                <div className="t">{t.t}</div>
                <div className="s">{t.s}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ─── Services ─────────────────────────────────────────────── */
function Services() {
  const services = [
    {
      num: '01', title: 'Local Tassie moves',
      desc: 'Door-to-door within Tasmania — from a studio in Sandy Bay to a farmhouse in Scottsdale. Fixed prices, two movers, one truck, no mucking about.',
      price: '$120/hr', unit: 'min. 2hr',
      features: ['2 experienced movers', 'Fully equipped truck', 'Blankets & trolleys included', 'Stairs & tight access handled'],
    },
    {
      num: '02', title: 'Packing & unpacking',
      desc: 'Let us wrap it. Our team packs your whole place in a day with premium boxes, bubble wrap and a labelling system that actually makes sense at the other end.',
      price: '$85/hr', unit: 'per packer',
      features: ['Premium double-walled boxes', 'Fragile items wrapped individually', 'Room-by-room labelling', 'Unpack service available'],
    },
    {
      num: '03', title: 'Furniture delivery',
      desc: "Just bought a couch from Gumtree? We'll grab it and drop it off same-day across Hobart and Launceston. Perfect for single-item jobs.",
      price: '$90', unit: 'flat fee',
      features: ['Same-day in metro areas', 'Two movers for heavy items', 'Assembly available', 'No minimum charge'],
    },
  ];
  return (
    <section id="services" style={{background: 'var(--bg-alt)'}}>
      <div className="container">
        <div className="section-head">
          <div>
            <span className="eyebrow">What we do</span>
            <h2>Three services.<br/>Done properly.</h2>
          </div>
          <p className="lead">
            We don't try to be everything to everyone. We do local removals, packing, and furniture delivery —
            and we do each one bloody well.
          </p>
        </div>
        <div className="services-grid">
          {services.map(s => (
            <div className="service" key={s.num}>
              <span className="num">{s.num} / 03</span>
              <h3>{s.title}</h3>
              <p style={{color: 'var(--muted)', fontSize: 15, lineHeight: 1.55}}>{s.desc}</p>
              <ul>{s.features.map(f => <li key={f}>{f}</li>)}</ul>
              <div className="price">
                <span className="amount">{s.price}</span>
                <small>{s.unit}</small>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ─── Calculator ───────────────────────────────────────────── */
function Calculator() {
  const [size, setSize] = React.useState('2br');
  const [distance, setDistance] = React.useState(35);
  const [stairs, setStairs] = React.useState(0);
  const [addons, setAddons] = React.useState({ packing: false, unpacking: false, insurance: true, assembly: false });

  const sizes = [
    { id: 'studio', label: 'Studio / 1 bed', sub: 'Up to 2 tonnes', base: 280 },
    { id: '2br',    label: '2 bedrooms',     sub: 'Typical apartment', base: 460 },
    { id: '3br',    label: '3 bedrooms',     sub: 'Family home', base: 720 },
    { id: '4br',    label: '4+ bedrooms',    sub: 'Large home', base: 1020 },
  ];
  const sz = sizes.find(s => s.id === size);
  const base = sz.base;
  const dist = Math.round(distance * 3.2);
  const stair = stairs * 40;
  const addonPrices = { packing: 280, unpacking: 180, insurance: 60, assembly: 90 };
  const addonsTotal = Object.entries(addons).reduce((sum, [k, v]) => sum + (v ? addonPrices[k] : 0), 0);
  const total = base + dist + stair + addonsTotal;
  const toggle = k => setAddons(a => ({ ...a, [k]: !a[k] }));

  return (
    <section id="pricing">
      <div className="container">
        <div className="section-head">
          <div>
            <span className="eyebrow">Fixed price calculator</span>
            <h2>Work out your move<br/>in 30 seconds.</h2>
          </div>
          <p className="lead">
            No phone tag, no "someone will call you back tomorrow". Drag the sliders, pick your extras,
            and see exactly what your move will cost.
          </p>
        </div>
        <div className="calc">
          <div className="calc-controls">
            <div className="calc-ctrl">
              <label>Home size</label>
              <div className="size-toggle">
                {sizes.map(s => (
                  <button key={s.id} className={size === s.id ? 'active' : ''} onClick={() => setSize(s.id)}>
                    {s.label}
                    <span className="sz-sub">{s.sub}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="calc-ctrl">
              <label>Distance <span className="v">{distance} km</span></label>
              <input type="range" min="1" max="400" value={distance} onChange={e => setDistance(+e.target.value)} />
            </div>
            <div className="calc-ctrl">
              <label>Flights of stairs <span className="v">{stairs}</span></label>
              <input type="range" min="0" max="6" value={stairs} onChange={e => setStairs(+e.target.value)} />
            </div>
            <div className="calc-ctrl">
              <label>Optional extras</label>
              <div className="addons">
                {[
                  { id: 'packing', t: 'Full packing service', p: 280 },
                  { id: 'unpacking', t: 'Unpack at destination', p: 180 },
                  { id: 'insurance', t: 'Premium insurance cover', p: 60 },
                  { id: 'assembly', t: 'Furniture assembly', p: 90 },
                ].map(a => (
                  <div key={a.id} className={`addon ${addons[a.id] ? 'on' : ''}`} onClick={() => toggle(a.id)}>
                    <div style={{display: 'flex', gap: 12, alignItems: 'center'}}>
                      <div className="check">
                        {addons[a.id] && (
                          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                            <path d="M2 6l3 3 5-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        )}
                      </div>
                      <span style={{fontSize: 14, fontWeight: 500}}>{a.t}</span>
                    </div>
                    <span className="price">+${a.p}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="calc-result">
            <div className="label">Your estimate</div>
            <div className="big"><sup>$</sup>{total}</div>
            <div className="range">Range ${Math.round(total * 0.92)}–${Math.round(total * 1.08)} · fixed at booking</div>
            <div className="breakdown">
              <div className="row"><span>Base rate · {sz.label}</span><span>${base}</span></div>
              <div className="row"><span>Distance · {distance} km</span><span>${dist}</span></div>
              {stair > 0 && <div className="row"><span>Stairs access</span><span>${stair}</span></div>}
              {addonsTotal > 0 && <div className="row"><span>Extras</span><span>${addonsTotal}</span></div>}
            </div>
            <button className="btn btn-primary" style={{marginTop: 16, justifyContent: 'center'}}>
              Lock this price in →
            </button>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── About ────────────────────────────────────────────────── */
function About() {
  return (
    <section id="about">
      <div className="container">
